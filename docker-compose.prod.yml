services:

  # ── Base de datos PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: planner-db-prod
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d horarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Backend Spring Boot ─────────────────────────────────────
  backend:
    build:
      context: ./backend/horarios_api
      dockerfile: Dockerfile.prod
    container_name: planner-backend-prod
    restart: always
    env_file:
      - .env
    environment:
      TZ: America/Lima
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/horarios_db
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

