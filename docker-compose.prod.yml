services:
  backend:
    build:
      context: ./backend/horarios_api
      dockerfile: Dockerfile.prod
    container_name: planner-backend-prod
    restart: always
    env_file:
      - ./backend/horarios_api/.env.prod
    environment:
      TZ: America/Lima
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

