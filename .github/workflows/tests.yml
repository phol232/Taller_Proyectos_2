name: Tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Run tests
        working-directory: backend/horarios_api
        run: ./gradlew test --no-daemon --continue
        # --continue: ejecuta todos los tests aunque haya fallos (para ver el reporte completo)

      - name: Publish test report (JUnit XML)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Backend — JUnit Results"
          path: "backend/horarios_api/build/test-results/test/*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: backend/horarios_api/build/reports/tests/test/
          retention-days: 7

  # ── Solver CSP (FastAPI / Python) ─────────────────────────────────────────
  solver-tests:
    name: Solver Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: solver/requirements.txt

      - name: Install dependencies
        working-directory: solver
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: solver
        # test_integration.py se omite: requiere PostgreSQL
        run: |
          python -m pytest tests/test_components.py tests/test_parallel.py \
            -v --junitxml=test-results.xml

      - name: Publish test report (JUnit XML)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Solver — pytest Results"
          path: "solver/test-results.xml"
          reporter: java-junit
          fail-on-error: false

  # ── Frontend (Next.js / Vitest) ────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend
        run: pnpm test -- --reporter=verbose --reporter=junit --outputFile=test-results.xml

      - name: Publish test report (JUnit XML)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "Frontend — Vitest Results"
          path: "frontend/test-results.xml"
          reporter: java-junit
          fail-on-error: false
