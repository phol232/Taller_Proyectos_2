name: Build & Push Backend

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/horarios_api/**"

jobs:
  build-and-push:
    name: Build Docker image (linux/amd64) & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/horarios_api
          file: ./backend/horarios_api/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ghcr.io/phol232/horarios-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Dokploy redeploy
        if: github.ref == 'refs/heads/develop'
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d '{"ref":"refs/heads/develop","repository":{"name":"Taller_Proyectos_2","full_name":"phol232/Taller_Proyectos_2"}}' \
            https://dokploy.optrix.cloud/api/deploy/compose/BjacmFakCsRAGwe36iTz3
