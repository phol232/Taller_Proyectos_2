name: Build & Push Backend

on:
  push:
    branches:
      - develop
      - main
    paths:
      - "backend/horarios_api/**"

jobs:
  build-and-push:
    name: Build Docker image (linux/amd64) & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/horarios_api
          file: ./backend/horarios_api/Dockerfile.prod
          platforms: linux/amd64
          push: true
          tags: ghcr.io/phol232/horarios-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
