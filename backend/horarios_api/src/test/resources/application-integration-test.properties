# =====================================================================
# Propiedades para pruebas de integración (@SpringBootTest)
# Se carga via @TestPropertySource — sobreescribe application.properties
# =====================================================================

# H2 in-memory — permite que JPA / @EnableJpaAuditing arranquen sin PostgreSQL.
# Los adapters JPA son igual reemplazados por @MockitoBean en los puertos.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Solo excluir Redis: no hay Redis en pruebas
spring.autoconfigure.exclude=\
  org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

# Cache deshabilitada (no necesita Redis)
app.cache.enabled=false
spring.cache.type=none

# JWT — clave de prueba: "test_secret_for_test_integration" (32 bytes)
jwt.secret=dGVzdF9zZWNyZXRfZm9yX3Rlc3RfaW50ZWdyYXRpb24=
jwt.access-token-expiration-seconds=3600
jwt.refresh-token-expiration-seconds=604800

# OAuth2 — valores ficticios (el adaptador está mockeado)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Propiedades de la app
app.frontend.url=http://localhost:3000
app.cors.allowed-origins=http://localhost:3000
app.solver.base-url=http://localhost:8090
app.solver.internal-token=test-token

# Mail — no se usa porque EmailNotificationAdapter está mockeado
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

# Password reset
app.password-reset.from-email=test@test.com
app.password-reset.from-name=Test
app.password-reset.otp-expiry-minutes=10
app.password-reset.max-requests-per-window=3
app.password-reset.rate-limit-window-minutes=15
app.password-reset.max-verify-attempts=5
