spring.application.name=horarios_api
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# =====================
#  Data Source (PostgreSQL)
# =====================
spring.datasource.url=${DB_URL:jdbc:postgresql://db:5432/horarios_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# =====================
#  JPA / Hibernate
# =====================
# 'none' : el schema se gestiona manualmente via database/schema.sql
# Usar 'validate' en produccion una vez el schema este estable
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# =====================
#  JWT
# =====================
# jwt.secret debe ser un valor Base64 de 32 bytes.
# Generar con: openssl rand -base64 32
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-seconds=${JWT_ACCESS_EXP:3600}
jwt.refresh-token-expiration-seconds=${JWT_REFRESH_EXP:604800}

# =====================
#  Google OAuth2
# =====================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =====================
#  App custom properties
# =====================
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.security.cookie.secure=${COOKIE_SECURE:false}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# =====================
#  Redis (SSE pub/sub)
# =====================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s

# =====================
#  OpenAPI / Swagger
# =====================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# =====================
#  Spring Mail (Brevo SMTP)
# =====================
spring.mail.host=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.ssl.checkserveridentity=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# =====================
#  Password Reset OTP
# =====================
app.password-reset.otp-expiry-minutes=${OTP_EXPIRY_MINUTES:10}
app.password-reset.max-requests-per-window=${OTP_MAX_REQUESTS:3}
app.password-reset.rate-limit-window-minutes=${OTP_RATE_WINDOW_MINUTES:15}
app.password-reset.max-verify-attempts=${OTP_MAX_VERIFY_ATTEMPTS:5}
app.password-reset.from-email=${SMTP_FROM_EMAIL:operaciones@wankoraep.com}
app.password-reset.from-name=${SMTP_FROM_NAME:Wankora}

# =====================
#  Actuator
# =====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# =====================
#  Logging (configured via logback-spring.xml)
# =====================
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
