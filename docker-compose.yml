services:

  # ── Base de datos PostgreSQL 
  db:
    image: postgres:16-alpine
    container_name: planner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d horarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (SSE pub/sub) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: planner-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ─────────────────────────────────────
  backend:
    build:
      context: ./backend/horarios_api
      dockerfile: Dockerfile
    container_name: planner-backend
    restart: unless-stopped
    env_file:
      - ./backend/horarios_api/.env
    environment:
      DB_URL: jdbc:postgresql://db:5432/horarios_db_prueba
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SOLVER_BASE_URL: http://solver:8090
      TZ: America/Lima
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend Next.js ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planner-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Solver CSP Microservice (FastAPI) ───────────────────────
  solver:
    build:
      context: ./solver
      dockerfile: Dockerfile
    container_name: planner-solver
    restart: unless-stopped
    env_file:
      - ./solver/.env
    environment:
      SOLVER_DB_DSN: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@db:5432/horarios_db_prueba
      TZ: America/Lima
      # Paralelismo de la Fase 1 (portafolio de ciclos). 2 workers = 2 vCPU.
      SOLVER_PARALLEL_ENABLED: "true"
      SOLVER_PARALLEL_WORKERS: "2"
      SOLVER_PARALLEL_CYCLES: "2"
      SOLVER_PARALLEL_TIME_FACTOR: "1.0"
      # Búsqueda local converge más rápido (menos espera entre kicks) → menor wall, sigue CONVERGED.
      SOLVER_LOCAL_SEARCH_PATIENCE: "200"
      SOLVER_LOCAL_SEARCH_MAX_KICKS: "3"
    ports:
      - "8090:8090"
    depends_on:
      db:
        condition: service_healthy

  # ── SonarQube (análisis estático de calidad de código) ────
  # UI: http://localhost:9000  (admin / admin en primer acceso)
  # Genera un token en SonarQube y exporta SONAR_TOKEN antes de escanear.
  sonarqube-db:
    image: postgres:16-alpine
    container_name: planner-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    container_name: planner-sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Necesario en macOS / entornos con vm.max_map_count bajo
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  # Scanners (perfil sonar): ejecutar por separado tras generar cobertura
  #   frontend → pnpm test:coverage
  #   backend  → ./gradlew test jacocoTestReport
  #   solver   → pytest (genera coverage.lcov)
  sonar-scanner-frontend:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: planner-sonar-frontend
    profiles: ["sonar"]
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
    volumes:
      - ./frontend:/usr/src
    working_dir: /usr/src
    command: sonar-scanner

  sonar-scanner-backend:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: planner-sonar-backend
    profiles: ["sonar"]
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
    volumes:
      - ./backend/horarios_api:/usr/src
    working_dir: /usr/src
    command: sonar-scanner

  sonar-scanner-solver:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: planner-sonar-solver
    profiles: ["sonar"]
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN}
    volumes:
      - ./solver:/usr/src
    working_dir: /usr/src
    command: sonar-scanner

volumes:
  postgres_data:
  redis_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
