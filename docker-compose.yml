services:

  # ── Base de datos PostgreSQL 
  db:
    image: postgres:16-alpine
    container_name: planner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: horarios_db
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d horarios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (SSE pub/sub) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: planner-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Spring Boot ─────────────────────────────────────
  backend:
    build:
      context: ./backend/horarios_api
      dockerfile: Dockerfile
    container_name: planner-backend
    restart: unless-stopped
    env_file:
      - ./backend/horarios_api/.env
    environment:
      DB_URL: jdbc:postgresql://db:5432/horarios_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: America/Lima
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend Next.js ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planner-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
